spring:
  main:
    web-application-type: none

  datasource:
    url: jdbc:h2:file:${user.home}/.chuj-nlp-studio/db/chuj-studio;AUTO_SERVER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  name: NLP Studio
  theme: dark